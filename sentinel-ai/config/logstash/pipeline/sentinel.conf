input {
  # Beats input (Filebeat, Winlogbeat, etc.)
  beats {
    port => 5044
  }

  # TCP syslog input
  tcp {
    port => 5000
    codec => json_lines
    type => "syslog"
  }

  # UDP syslog
  udp {
    port => 5000
    codec => json_lines
    type => "syslog"
  }
}

filter {
  # Parse timestamp
  if [type] == "syslog" {
    grok {
      match => { "message" => "%{SYSLOGTIMESTAMP:syslog_timestamp} %{SYSLOGHOST:hostname} %{DATA:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:syslog_message}" }
      add_field => { "event_type" => "syslog" }
    }
    date {
      match => [ "syslog_timestamp", "MMM  d HH:mm:ss", "MMM dd HH:mm:ss" ]
    }
  }

  # Enrich with GeoIP for external IPs
  if [source.ip] {
    geoip {
      source => "source.ip"
      target => "geoip"
    }
  }

  # Add Sentinel metadata
  mutate {
    add_field => {
      "sentinel_version" => "1.0.0"
      "processed_at" => "%{@timestamp}"
    }
  }
}

output {
  # Route to appropriate Elasticsearch index
  if [event.category] == "authentication" or [type] == "auth" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS}"]
      index => "sentinel-auth-%{+YYYY.MM.dd}"
    }
  } else if [event.category] == "network" or [type] == "network" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS}"]
      index => "sentinel-network-%{+YYYY.MM.dd}"
    }
  } else if [type] == "syslog" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS}"]
      index => "sentinel-syslog-%{+YYYY.MM.dd}"
    }
  } else {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOSTS}"]
      index => "sentinel-application-%{+YYYY.MM.dd}"
    }
  }

  # Debug output (disable in production)
  # stdout { codec => rubydebug }
}
